<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="fire-canvas"></div>
    <div id="particles-container"></div>

    <main>
      <section id="hero" class="section hero">
        <h1 id="hero-name"></h1>
        <p id="hero-tagline" class="tagline"></p>
      </section>

      <section id="bio" class="section bio">
        <h2 class="section-title">About</h2>
        <p id="bio-text" class="bio-text"></p>
      </section>

      <section id="gallery" class="section gallery">
        <h2 class="section-title">Gallery</h2>
        <div id="gallery-grid" class="gallery-grid"></div>
      </section>

      <section id="video" class="section video-section">
        <h2 class="section-title">Video</h2>
        <div id="video-wrapper" class="video-wrapper"></div>
      </section>

      <section id="contact" class="section contact">
        <h2 class="section-title">Contact</h2>
        <div id="contact-links" class="contact-links"></div>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
